server:
  env: "development"
  port: 8080
  host: "localhost"
  read_timeout: 30
  write_timeout: 30

database:
  driver: "sqlite"  # 使用 SQLite

jwt:
  secret: "development-secret-key"
  expires_hours: 24

log:
  level: "debug"
  format: "console"
  output: "stdout"

storage:
  type: "local"
  local:
    base_path: "./storage/uploads"
    temp_path: "./storage/uploads/temp"
    max_size_mb: 100