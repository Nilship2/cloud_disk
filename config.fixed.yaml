server:
  env: "production"
  port: 8080
  host: "0.0.0.0"

database:
  driver: "mysql"
  host: "mysql"
  port: 3306
  username: "root"
  password: "rootpassword"
  database: "cloud_disk"
  charset: "utf8mb4"
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600

jwt:
  secret: "your-32-character-jwt-secret-key-change-this"
  expires_hours: 24

log:
  level: "info"
  format: "json"
  output: "stdout"

storage:
  type: "minio"
  minio:
    endpoint: "minio:9000"
    access_key: "minioadmin"
    secret_key: "minioadmin"
    use_ssl: false
    bucket_name: "cloud-disk"
