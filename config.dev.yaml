server:
  env: "production"  # 改为 production
  port: 8080
  host: "0.0.0.0"
  read_timeout: 30
  write_timeout: 30

database:
  driver: "mysql"
  host: "localhost"
  port: 3306  # 改为 3306
  username: "root"
  password: "123456"
  database: "cloud_disk"
  charset: "utf8mb4"
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600

jwt:
  secret: "your-secret-key-change-in-production"
  expires_hours: 24

log:
  level: "info"
  format: "json"
  output: "file"
  file_path: "C:/cloud-disk/logs/app.log"

storage:
  type: "local"
  local:
    base_path: "C:/cloud-disk/storage/uploads"
    temp_path: "C:/cloud-disk/storage/uploads/temp"
    max_size_mb: 100