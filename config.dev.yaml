# config.dev.yaml
server:
  env: "development"
  port: 8080
  host: "localhost"  # 改为 localhost 或 0.0.0.0
  read_timeout: 30
  write_timeout: 30

database:
  host: "localhost"
  username: "root"
  password: "123456"
  database: "cloud_disk_dev"

redis:
  host: "localhost"
  port: 6379

jwt:
  secret: "development-secret-key"
  expires_hours: 24

log:
  level: "debug"
  format: "console"
  output: "stdout"

storage:
  type: "local"
  local:
    base_path: "./storage/uploads"
    temp_path: "./storage/uploads/temp"
    max_size_mb: 100