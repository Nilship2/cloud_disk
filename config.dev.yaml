# config.dev.yaml
server:
  env: "development"
  port: 8080
  host: "localhost"  # ж”№дёє localhost пї?0.0.0.0
  read_timeout: 30
  write_timeout: 30

database:
  driver: "mysql"
  host: "localhost"
  port: 3307  # ж”№дёє3307пјЊдёЋdocker-compose.ymlдїќжЊЃдёЂпї?
  username: "root"
  password: "rootpassword"
  database: "cloud_disk_dev"
  charset: "utf8mb4"
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600

redis:
  host: "localhost"
  port: 6379

jwt:
  secret: "development-secret-key"
  expires_hours: 24

log:
  level: "debug"
  format: "console"
  output: "stdout"

storage:
  type: "local"
  local:
    base_path: "./storage/uploads"
    temp_path: "./storage/uploads/temp"
    max_size_mb: 100
