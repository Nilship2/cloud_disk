# config.prod.yaml
server:
  env: "production"
  port: 8080
  host: "0.0.0.0"
  read_timeout: 30
  write_timeout: 30

database:
  driver: "mysql"
  host: "mysql"  # Docker服务名
  port: 3306     # 容器内端口
  username: "root"
  password: "${MYSQL_ROOT_PASSWORD}"
  database: "cloud_disk"
  charset: "utf8mb4"
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600

redis:
  host: "redis"
  port: 6379
  password: "${REDIS_PASSWORD}"
  db: 0
  pool_size: 20

jwt:
  secret: "${JWT_SECRET}"
  expires_hours: 24

log:
  level: "info"
  format: "json"
  output: "stdout"

storage:
  type: "minio"  # 生产环境使用MinIO
  minio:
    endpoint: "minio:9000"
    access_key: "${MINIO_ACCESS_KEY}"
    secret_key: "${MINIO_SECRET_KEY}"
    use_ssl: false
    bucket_name: "cloud-disk"
  local:
    base_path: "./storage/uploads"
    temp_path: "./storage/uploads/temp"
    max_size_mb: 100