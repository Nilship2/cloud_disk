server:
  env: "production"
  port: 8080
  host: "0.0.0.0"
  read_timeout: 30
  write_timeout: 30

database:
  driver: "mysql"
  host: "localhost"  # 确保是 localhost 不是 127.0.0.1
  port: 3306
  username: "root"
  password: "123456"
  database: "cloud_disk"

jwt:
  secret: "abcdef"  # 改为随机字符串
  expires_hours: 24

log:
  level: "info"
  format: "json"
  output: "file"
  file_path: "C:/cloud-disk/logs/app.log"

storage:
  type: "local"
  local:
    base_path: "C:/cloud-disk/storage/uploads"
    temp_path: "C:/cloud-disk/storage/uploads/temp"
    max_size_mb: 100